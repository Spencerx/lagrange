# macOS System Fonts.
#
# Properties:
#   name        (string)    Human-readable name of the font.
#   regular     (string)    Font file for the Regular style (required!).
#   italic      (string)    Font file for the Italic style (optional).
#   light       (string)    Font file for the Light style (optional).
#   semibold    (string)    Font file for the Semibold style (optional).
#   bold        (string)    Font file for the Bold style (optional).
#   auxiliary   (bool)      Not selectable as a content font (e.g., symbols).
#   allowspace  (bool)      An auxiliary font's metrics for space characters are used.
#   monospace   (bool)      Monospace font; suitable for performatted text.
#   override    (bool)      Check this first regardless of active font.
#   priority    (int)       Lookup priority (largest checked first).
#   glyphscale  (float)     Additional glyph scaling (<= 1.0).
#   height      (float)     A multiplier to alter the height of the font without altering spacing (<= 2.0).
#   voffset     (float)     Vertical offset (normalized).
#
# `glyphscale`, `height`, and `voffset` can also be specified separately for the UI and
# document domains by prefixing `ui.` or `doc.` to the key.

version = 1

[apple-avenir-next]
name           = "Avenir Next"
regular        = "/System/Library/Fonts/Avenir Next.ttc:5"
italic         = "/System/Library/Fonts/Avenir Next.ttc:6"
light          = "/System/Library/Fonts/Avenir Next.ttc:7"
semibold       = "/System/Library/Fonts/Avenir Next.ttc:2"
bold           = "/System/Library/Fonts/Avenir Next.ttc:0"

[apple-helvetica-neue]
name           = "Helvetica Neue"
glyphscale     = 0.93
doc.height     = 0.88
doc.voffset    = 1.3
regular        = "/System/Library/Fonts/HelveticaNeue.ttc:0"
italic         = "/System/Library/Fonts/HelveticaNeue.ttc:2"
bold           = "/System/Library/Fonts/HelveticaNeue.ttc:1"

[apple-palatino]
name           = "Palatino"
glyphscale     = 0.82
doc.height     = 0.95
regular        = "/System/Library/Fonts/Palatino.ttc:0"
italic         = "/System/Library/Fonts/Palatino.ttc:1"
bold           = "/System/Library/Fonts/Palatino.ttc:2"

[apple-optima]
name           = "Optima"
glyphscale     = 0.90
doc.height     = 0.95
regular        = "/System/Library/Fonts/Optima.ttc:0"
italic         = "/System/Library/Fonts/Optima.ttc:2"
bold           = "/System/Library/Fonts/Optima.ttc:1"

[apple-times]
name           = "Times"
glyphscale     = 0.83
doc.height     = 0.9
doc.voffset    = 1.5
regular        = "/System/Library/Fonts/Times.ttc:0"
italic         = "/System/Library/Fonts/Times.ttc:2"
bold           = "/System/Library/Fonts/Times.ttc:1"

[apple-menlo]
name           = "Menlo"
monospace      = true
height         = 0.8
regular        = "/System/Library/Fonts/Menlo.ttc:0"
italic         = "/System/Library/Fonts/Menlo.ttc:2"
bold           = "/System/Library/Fonts/Menlo.ttc:1"
